<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>2025清山活动</title>
<style>
body{max-width:900px;margin:30px auto;padding:0 15px;font-family:Microsoft YaHei;}
img{width:100%;height:auto;margin-bottom:20px;border-radius:6px;}
.back{display:inline-block;margin-bottom:20px;color:#0d6efd;text-decoration:none;}
/* 密码弹窗样式 */
#login{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;}
#login input{padding:10px;font-size:16px;margin-right:10px;}
#login button{padding:10px 20px;}
</style>
</head>
<body>
<!-- 密码验证层 -->
<div id="login">
  <input type="password" id="pwd" placeholder="请输入访问密码">
  <button onclick="checkPwd()">确认</button>
</div>

<a class="back" href="index.html">← 返回首页</a>
<h2>2025清山活动</h2>

<img src="images/002.jpg">


<script>
// 这里改你的密码（默认：666666）
const correctPwd = "666666";
function checkPwd(){
  let input = document.getElementById("pwd").value;
  if(input === correctPwd){
    document.getElementById("login").style.display = "none";
  }else{
    alert("密码错误，请重试");
  }
}
</script>
</body>
</html>
